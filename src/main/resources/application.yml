spring:
  application:
    name: mcp-gateway
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:mcp_gateway;MODE=MYSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: always

server:
  port: 8080

mybatis:
  config-location: classpath:mybatis/config/mybatis-config.xml
  mapper-locations: classpath:mybatis/mapper/*.xml

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    cn.bugstack.ai.mcpgateway: info
