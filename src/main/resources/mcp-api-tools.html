<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCP 工具接入</title>
    <link rel="stylesheet" href="./mcp-api-shared.css">
    <style>
        .tool-shell {
            background: var(--panel);
            border: 1px solid rgba(214, 223, 235, 0.9);
            border-radius: 24px;
            padding: 28px;
            box-shadow: var(--shadow);
        }

        .tool-title {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 10px;
            font-size: 28px;
            font-weight: 700;
        }

        .tool-badge {
            width: 38px;
            height: 38px;
            border-radius: 12px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #a6e36a, #59c66e);
            color: #fff;
            font-weight: 700;
        }

        .section-line {
            height: 4px;
            width: 100%;
            border-radius: 999px;
            background: linear-gradient(90deg, #2a72ff, #4586ff);
            margin: 10px 0 26px;
        }

        .tool-form-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 18px 20px;
        }

        .tool-form-grid .field.full {
            grid-column: 1 / -1;
        }

        .tool-button-row {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            margin-top: 16px;
        }

        .tool-button-row button {
            min-width: 180px;
            padding: 15px 24px;
            border-radius: 16px;
        }

        .tool-button-row .list-btn {
            background: linear-gradient(135deg, #677487, #4d5b6f);
            color: #fff;
            box-shadow: 0 10px 24px rgba(77, 91, 111, 0.24);
        }

        .tool-button-row .protocol-btn {
            background: linear-gradient(135deg, #36c4dc, #1f9ec7);
            color: #fff;
            box-shadow: 0 10px 24px rgba(31, 158, 199, 0.24);
        }

        .tool-table-wrap {
            margin-top: 18px;
            border: 1px solid var(--line);
            border-radius: 18px;
            overflow: hidden;
            background: #fff;
        }

        .tool-table-scroll {
            max-height: 280px;
            overflow: auto;
        }

        .tool-empty {
            padding: 24px;
            color: var(--muted);
        }

        .mapping-panel {
            border: 1px solid var(--line);
            border-radius: 18px;
            background: #fbfdff;
            padding: 16px;
        }

        .mapping-row {
            display: grid;
            grid-template-columns: 120px 140px 1fr 1fr 120px 140px 110px 90px;
            gap: 10px;
            align-items: end;
            padding: 12px 0;
            border-bottom: 1px solid #e7eef7;
        }

        .mapping-row:last-child {
            border-bottom: none;
        }

        .mapping-row .field {
            gap: 6px;
        }

        .mapping-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-top: 14px;
            flex-wrap: wrap;
        }

        .mapping-preview {
            margin-top: 12px;
            min-height: 120px;
            max-height: 220px;
            overflow: auto;
            padding: 14px;
            border-radius: 16px;
            background: #f4f8ff;
            border: 1px solid var(--line);
            font-family: Consolas, "Courier New", monospace;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .mini-nav {
            margin-top: 16px;
        }

        @media (max-width: 960px) {
            .tool-form-grid {
                grid-template-columns: 1fr;
            }

            .tool-button-row button {
                width: 100%;
            }

            .mapping-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<div class="page">
    <div class="hero">
        <div>
            <h1>工具接入</h1>
            <p>这个页面用于维护 MCP 工具注册、HTTP 协议配置和映射信息，下方直接展示已注册工具列表。</p>
            <div class="nav-links mini-nav">
                <a class="nav-button secondary" href="./mcp-api-gateway.html">返回首页</a>
                <a class="nav-button secondary" href="./mcp-api-connection.html">连接调试</a>
                <a class="nav-button secondary" href="./mcp-api-gateway.html">网关管理</a>
                <a class="nav-button secondary" href="./mcp-api-tools.html">工具管理</a>
                <a class="nav-button secondary" href="./mcp-api-ai-chat.html">AI 聊天</a>
            </div>
        </div>
    </div>

    <section class="tool-shell">
        <input id="server-url" type="hidden">
        <input id="gateway-id" type="hidden" value="gateway_001">
        <input id="api-key" type="hidden">

        <div class="tool-title">
            <span class="tool-badge">T</span>
            <span>工具接入</span>
        </div>
        <div class="section-line"></div>

        <div class="tool-form-grid">
            <div class="field">
                <label for="tool-name">工具名称:</label>
                <input id="tool-name" type="text" value="JavaSDKMCPClient_getCompanyEmployee">
            </div>
            <div class="field">
                <label for="tool-desc">工具描述:</label>
                <input id="tool-desc" type="text" value="获取公司雇员信息">
            </div>
            <div class="field">
                <label for="http-url">HTTP 地址:</label>
                <input id="http-url" type="text" value="http://localhost:8701/api/v1/mcp/get_company_employee">
            </div>
            <div class="field">
                <label for="http-method">HTTP 方法:</label>
                <select id="http-method">
                    <option value="POST">POST</option>
                    <option value="GET">GET</option>
                </select>
            </div>
            <div class="field full">
                <label for="http-headers">HTTP Headers(JSON):</label>
                <textarea id="http-headers" class="small-textarea">{}</textarea>
            </div>
            <div class="field full">
                <label>字段映射:</label>
                <div class="mapping-panel">
                    <div id="mapping-list"></div>
                    <div class="mapping-actions">
                        <button id="add-mapping-btn" class="secondary" type="button">新增映射字段</button>
                        <span class="hint">按行填写字段即可，页面会自动转换成后端所需的 mappings 数组。</span>
                    </div>
                    <div id="mapping-preview" class="mapping-preview"></div>
                </div>
            </div>
        </div>

        <div class="tool-button-row">
            <button id="register-tool-btn">新增工具</button>
            <button id="list-tool-btn" class="list-btn" type="button">查看工具列表</button>
        </div>

        <div class="tool-form-grid" style="margin-top: 22px;">
            <div class="field">
                <label for="protocol-id">协议ID:</label>
                <input id="protocol-id" type="number" placeholder="输入要更新的 protocolId" value="83666188">
            </div>
            <div class="field">
                <label for="protocol-type">协议类型:</label>
                <select id="protocol-type">
                    <option value="http">http</option>
                </select>
            </div>
            <div class="field full">
                <label for="tool-id">工具ID（更新协议时选填）:</label>
                <input id="tool-id" type="text" placeholder="输入 toolId，便于记录追踪">
            </div>
        </div>

        <div class="tool-button-row">
            <button id="protocol-btn" class="protocol-btn" type="button">更新工具协议</button>
            <button id="clear-log-btn" class="warn" type="button">清空日志</button>
        </div>

        <div style="margin-top: 28px;">
            <h2 style="margin-bottom: 12px;">已注册工具:</h2>
            <div class="tool-table-wrap">
                <div class="tool-table-scroll">
                    <table class="table">
                        <thead>
                        <tr>
                            <th>工具名</th>
                            <th>描述</th>
                            <th>协议</th>
                            <th>HTTP</th>
                            <th>映射数</th>
                        </tr>
                        </thead>
                        <tbody id="tool-table-body">
                        <tr>
                            <td colspan="5" class="tool-empty">暂无工具</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div style="margin-top: 28px;">
            <h2 style="margin-bottom: 12px;">操作日志:</h2>
            <div id="log-box" class="log-box"></div>
        </div>
    </section>
</div>

<script src="./mcp-api-common.js"></script>
<script>
    const common = window.McpApiCommon;
    const logId = "log-box";
    const defaultMappings = [
        {
            mappingType: "request",
            parentPath: "",
            fieldName: "city",
            mcpPath: "xxxRequest01.city",
            mcpType: "string",
            mcpDesc: "城市",
            isRequired: 1,
            sortOrder: 1
        },
        {
            mappingType: "request",
            parentPath: "xxxRequest01.company",
            fieldName: "name",
            mcpPath: "xxxRequest01.company.name",
            mcpType: "string",
            mcpDesc: "公司名称",
            isRequired: 1,
            sortOrder: 2
        }
    ];

    function getMappingRows() {
        return Array.from(document.querySelectorAll(".mapping-row"));
    }

    function syncMappingSortOrders() {
        getMappingRows().forEach((row, index) => {
            row.querySelector('[data-key="sortOrder"]').value = index + 1;
        });
    }

    function collectMappings() {
        syncMappingSortOrders();
        return getMappingRows().map((row, index) => ({
            mappingType: row.querySelector('[data-key="mappingType"]').value,
            parentPath: row.querySelector('[data-key="parentPath"]').value.trim(),
            fieldName: row.querySelector('[data-key="fieldName"]').value.trim(),
            mcpPath: row.querySelector('[data-key="mcpPath"]').value.trim(),
            mcpType: row.querySelector('[data-key="mcpType"]').value.trim(),
            mcpDesc: row.querySelector('[data-key="mcpDesc"]').value.trim(),
            isRequired: Number(row.querySelector('[data-key="isRequired"]').value || 0),
            sortOrder: index + 1
        })).filter((item) => item.fieldName || item.mcpPath);
    }

    function renderMappingPreview() {
        document.getElementById("mapping-preview").textContent = JSON.stringify(collectMappings(), null, 2);
    }

    function buildMappingRow(mapping) {
        return `
            <div class="mapping-row">
                <div class="field">
                    <label>映射类型</label>
                    <select data-key="mappingType">
                        <option value="request" ${mapping.mappingType === "request" ? "selected" : ""}>request</option>
                        <option value="response" ${mapping.mappingType === "response" ? "selected" : ""}>response</option>
                    </select>
                </div>
                <div class="field">
                    <label>父路径</label>
                    <input data-key="parentPath" type="text" value="${mapping.parentPath || ""}" placeholder="可选">
                </div>
                <div class="field">
                    <label>字段名</label>
                    <input data-key="fieldName" type="text" value="${mapping.fieldName || ""}" placeholder="如 city">
                </div>
                <div class="field">
                    <label>MCP 路径</label>
                    <input data-key="mcpPath" type="text" value="${mapping.mcpPath || ""}" placeholder="如 xxxRequest01.city">
                </div>
                <div class="field">
                    <label>字段类型</label>
                    <select data-key="mcpType">
                        <option value="string" ${(mapping.mcpType || "string") === "string" ? "selected" : ""}>string</option>
                        <option value="number" ${mapping.mcpType === "number" ? "selected" : ""}>number</option>
                        <option value="integer" ${mapping.mcpType === "integer" ? "selected" : ""}>integer</option>
                        <option value="boolean" ${mapping.mcpType === "boolean" ? "selected" : ""}>boolean</option>
                        <option value="object" ${mapping.mcpType === "object" ? "selected" : ""}>object</option>
                        <option value="array" ${mapping.mcpType === "array" ? "selected" : ""}>array</option>
                    </select>
                </div>
                <div class="field">
                    <label>字段说明</label>
                    <input data-key="mcpDesc" type="text" value="${mapping.mcpDesc || ""}" placeholder="如 城市">
                </div>
                <div class="field">
                    <label>必填</label>
                    <select data-key="isRequired">
                        <option value="1" ${Number(mapping.isRequired) === 1 ? "selected" : ""}>是</option>
                        <option value="0" ${Number(mapping.isRequired) !== 1 ? "selected" : ""}>否</option>
                    </select>
                </div>
                <div class="field">
                    <label>排序</label>
                    <input data-key="sortOrder" type="number" value="${mapping.sortOrder || 1}" readonly>
                </div>
                <div class="field" style="grid-column: 1 / -1;">
                    <button class="warn remove-mapping-btn" type="button">删除这一行</button>
                </div>
            </div>
        `;
    }

    function appendMappingRow(mapping) {
        const list = document.getElementById("mapping-list");
        const wrapper = document.createElement("div");
        wrapper.innerHTML = buildMappingRow(mapping);
        const row = wrapper.firstElementChild;
        row.querySelectorAll("input, select").forEach((element) => {
            element.addEventListener("input", renderMappingPreview);
            element.addEventListener("change", renderMappingPreview);
        });
        row.querySelector(".remove-mapping-btn").addEventListener("click", () => {
            row.remove();
            syncMappingSortOrders();
            renderMappingPreview();
        });
        list.appendChild(row);
        syncMappingSortOrders();
        renderMappingPreview();
    }

    function normalizeTools(payload) {
        const candidate = payload?.data || payload?.result?.tools || payload?.result || payload;
        if (!Array.isArray(candidate)) {
            return [];
        }

        return candidate.map((item) => ({
            name: item.name || item.toolName || "-",
            description: item.description || item.toolDesc || item.toolDescription || "",
            protocol: item.protocolType || item.protocol || "http",
            http: item.httpUrl || item.url || "",
            mappingCount: item.mappingCount || item.mappingNum || item.mappings?.length || 0
        }));
    }

    function renderRegisteredTools(tools) {
        const body = document.getElementById("tool-table-body");
        if (!Array.isArray(tools) || !tools.length) {
            body.innerHTML = `<tr><td colspan="5" class="tool-empty">暂无工具</td></tr>`;
            return;
        }

        body.innerHTML = tools.map((tool) => `
            <tr>
                <td>${tool.name || "-"}</td>
                <td>${tool.description || "暂无说明"}</td>
                <td>${tool.protocol || "http"}</td>
                <td>${tool.http || "-"}</td>
                <td>${tool.mappingCount || 0}</td>
            </tr>
        `).join("");
    }

    async function listTools() {
        const base = common.ensureApiKey(logId);
        if (!base) {
            return;
        }
        const url = common.buildUrl("/custom-mcp/tool/list", { gatewayId: base.gatewayId, api_key: base.apiKey });
        common.logTo(logId, `GET ${url}`);
        const result = await common.requestJson(url, { method: "GET" });
        common.logTo(logId, `响应(${result.status})`, result.data || result.text);
        const tools = normalizeTools(result.data);
        if (tools.length) {
            common.setStoredTools(tools);
            renderRegisteredTools(tools);
        } else {
            renderRegisteredTools(common.getStoredTools());
        }
    }

    async function callJson(url, method, body) {
        common.logTo(logId, `${method} ${url}`, body || "");
        const result = await common.requestJson(url, {
            method,
            headers: { "Content-Type": "application/json" },
            body: body ? JSON.stringify(body) : undefined
        });
        common.logTo(logId, `响应(${result.status})`, result.data || result.text);
        return result;
    }

    async function verifyHttpEndpoint(base) {
        const httpUrl = document.getElementById("http-url").value.trim();
        if (!httpUrl) {
            common.logTo(logId, "HTTP 地址为空，无法校验");
            return false;
        }

        const result = await callJson(
            common.buildUrl("/custom-mcp/tool/http/check", { api_key: base.apiKey }),
            "POST",
            { httpUrl }
        );

        if (!result.ok || !result.data?.reachable) {
            common.logTo(logId, "HTTP 地址校验失败，已阻止新增工具", result.data || result.text);
            window.alert("HTTP 地址不可达，不能新增工具");
            return false;
        }

        common.logTo(logId, "HTTP 地址校验通过", result.data);
        return true;
    }

    function toolRegisterPayload() {
        const base = common.ensureApiKey(logId);
        return {
            gatewayId: base.gatewayId,
            toolName: document.getElementById("tool-name").value,
            toolType: "http",
            toolDescription: document.getElementById("tool-desc").value,
            toolVersion: "1.0.0",
            protocolType: document.getElementById("protocol-type").value,
            httpUrl: document.getElementById("http-url").value,
            httpMethod: document.getElementById("http-method").value,
            httpHeaders: document.getElementById("http-headers").value,
            timeout: 30000,
            retryTimes: 0,
            status: 1,
            mappings: collectMappings()
        };
    }

    function protocolPayload() {
        const base = common.ensureApiKey(logId);
        return {
            gatewayId: base.gatewayId,
            toolId: document.getElementById("tool-id").value || null,
            toolName: document.getElementById("tool-name").value,
            protocolId: Number(document.getElementById("protocol-id").value),
            protocolType: document.getElementById("protocol-type").value,
            httpUrl: document.getElementById("http-url").value,
            httpMethod: document.getElementById("http-method").value,
            httpHeaders: common.parseJsonSafe(document.getElementById("http-headers").value) || {},
            mappings: collectMappings()
        };
    }

    document.getElementById("register-tool-btn").addEventListener("click", async () => {
        const base = common.ensureApiKey(logId);
        if (!base) {
            return;
        }
        const reachable = await verifyHttpEndpoint(base);
        if (!reachable) {
            return;
        }
        const result = await callJson(common.buildUrl("/custom-mcp/tool/register", { api_key: base.apiKey }), "POST", toolRegisterPayload());
        if (result.ok) {
            await listTools();
        }
    });

    document.getElementById("list-tool-btn").addEventListener("click", listTools);

    document.getElementById("protocol-btn").addEventListener("click", async () => {
        const base = common.ensureApiKey(logId);
        if (!base) {
            return;
        }
        const result = await callJson(common.buildUrl("/custom-mcp/tool/protocol/update", { api_key: base.apiKey }), "POST", protocolPayload());
        if (result.ok) {
            await listTools();
        }
    });

    document.getElementById("clear-log-btn").addEventListener("click", () => {
        document.getElementById(logId).textContent = "";
    });

    document.getElementById("add-mapping-btn").addEventListener("click", () => {
        appendMappingRow({
            mappingType: "request",
            parentPath: "",
            fieldName: "",
            mcpPath: "",
            mcpType: "string",
            mcpDesc: "",
            isRequired: 1,
            sortOrder: getMappingRows().length + 1
        });
    });

    common.initBaseFields();
    defaultMappings.forEach(appendMappingRow);
    renderRegisteredTools(common.getStoredTools());
</script>
</body>
</html>
